<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>

<style>
    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:800px;
    }

    h1{
        text-align:center;
        font-size:40px;
        margin-bottom:20px;
    }

    .card{
        background:#1e293b;
        padding:20px;
        border-radius:15px;
        margin-bottom:20px;
        box-shadow:0 0 15px rgba(0,0,0,0.3);
    }

    input, textarea{
        width:100%;
        box-sizing:border-box;
        padding:12px;
        border:none;
        border-radius:10px;
        margin-top:10px;
        font-size:16px;
    }

    textarea{
        min-height:150px;
        resize:vertical;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:10px;
        border:none;
        border-radius:10px;
        background:#2563eb;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#1d4ed8;
    }

    .vaultItem{
        background:#111827;
        padding:15px;
        border-radius:12px;
        margin-top:10px;
        border:1px solid #334155;
    }

    .date{
        color:#94a3b8;
        font-size:14px;
        margin-bottom:10px;
    }

    .hidden{
        display:none;
    }
</style>
</head>
<body>

<div class="container">

    <h1>🔒 Vault</h1>

    <div class="card">

        <input type="password" id="password" placeholder="Set Password">

        <textarea id="noteInput" placeholder="Write your secret info here..."></textarea>

        <button onclick="saveVault()">Save To Vault</button>

    </div>

    <div class="card">

        <input type="password" id="openPassword" placeholder="Enter Password">

        <button onclick="openVault()">Open Vault</button>

    </div>

    <div id="vaultContainer"></div>

</div>

<script>

let vaultData = JSON.parse(localStorage.getItem("vaultData")) || [];

function getTodayDate(){
    const today = new Date();

    const day = today.getDate();
    const month = today.getMonth() + 1;
    const year = today.getFullYear();

    return `${day}/${month}/${year}`;
}

function saveVault(){

    const password = document.getElementById("password").value;
    const note = document.getElementById("noteInput").value;

    if(password === "" || note === ""){
        alert("Fill everything.");
        return;
    }

    const vaultItem = {
        password: password,
        note: note,
        date: getTodayDate(),
        time: new Date().toLocaleTimeString()
    };

    vaultData.push(vaultItem);

    localStorage.setItem("vaultData", JSON.stringify(vaultData));

    document.getElementById("noteInput").value = "";

    alert("Saved to Vault!");
}

function openVault(){

    const enteredPassword = document.getElementById("openPassword").value;

    const container = document.getElementById("vaultContainer");

    container.innerHTML = "";

    let found = false;

    vaultData.forEach(item => {

        if(item.password === enteredPassword){

            found = true;

            container.innerHTML += `
                <div class="vaultItem">
                    <div class="date">
                        📅 ${item.date} | ⏰ ${item.time}
                    </div>

                    <div>
                        ${item.note}
                    </div>
                </div>
            `;
        }

    });

    if(!found){
        container.innerHTML = `
            <div class="vaultItem">
                Wrong password or no vault found.
            </div>
        `;
    }

}

</script>

</body>
</html>
